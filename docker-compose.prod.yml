version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatcall-postgres
    environment:
      POSTGRES_DB: chatcall
      POSTGRES_USER: chatcall_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatcall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatcall_user -d chatcall"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatcall-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - chatcall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    container_name: chatcall-coturn
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
    command: ["-c", "/etc/coturn/turnserver.conf"]

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatcall-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
    env_file:
      - ./server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatcall-network
    volumes:
      - ./uploads:/app/uploads
      - ./ssl:/app/ssl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  chatcall-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
